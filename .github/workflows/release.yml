name: Windows build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: windows-latest
    env:
      NUVIO_WIN_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Windows desktop target
        shell: pwsh
        run: .\scripts\check-windows.ps1

      - name: Build Windows packages
        shell: pwsh
        run: .\scripts\build-windows.ps1 -Version "$env:NUVIO_WIN_VERSION"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NuvioWin-windows
          path: artifacts/windows/*
          if-no-files-found: error

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:GITHUB_REF_NAME" artifacts/windows/* `
            --title "$env:GITHUB_REF_NAME" `
            --notes "NuvioWin Windows 10/11 build generated by GitHub Actions."
